<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap add book</title>

    <!--w css -->
    <link rel="stylesheet" href="css/style.css">

    <!--w bootstrap icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!--w bootstrap grid -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>

    <header>

        <!--r navbar -->
        <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="img/duck.png" alt="web icon">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Storico Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Help</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2 bg-white text-secondary" type="search" placeholder="Cerca..."
                            aria-label="Cerca..." />
                        <button class="btn btn-outline-light" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">

        <h2 class="my-4">Nuovo Libro</h2>

        <form class="row">

            <!--r author name -->
            <div class="col-6 mb-3">
                <label for="author-name" class="form-label">Nome Utore</label>
                <input type="text" class="form-control" id="author-name" placeholder="Inserisci il nome dell'Autore">
            </div>

            <!--r author surname -->
            <div class="col-6 mb-3">
                <label for="author-surname" class="form-label">Cognome Autore</label>
                <input type="text" class="form-control" id="author-surname"
                    placeholder="Inserisci il cognome dell'Autore">
            </div>

            <!--r book title -->
            <div class="col-12 mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" class="form-control" id="title" placeholder="Inserisci il titolo del libro">
            </div>

            <!--r gender selector -->
            <div class="col mb-3">
                <label for="gender-select" class="form-label">Genere</label>
                <select class="form-select" id="gender-select" required>
                    <option value="" disabled selected>Scegli il genere</option>
                    <option value="1">Horror</option>
                    <option value="2">Comedy</option>
                    <option value="3">Drama</option>
                </select>
            </div>

            <!--r age of pubblication -->
            <div class="col-12 mb-3">
                <label for="pubblication-age" class="form-label">Anno di Pubblicazione</label>
                <input type="text" class="form-control" id="pubblication-age" placeholder="Inserisci l'anno">
            </div>

            <!--r code ISBN# -->
            <div class="col mb-5">
                <label for="ISBN#" class="form-label">ISBN#</label>
                <input type="text" class="form-control" id="ISBN#" placeholder="Inserisci il codice ISBN#">
            </div>

            <hr>

            <!--r note -->
            <div class="col-12 my-3">
                <label for="note" class="form-label">Note</label>
                <textarea class="form-control" id="note" rows="3" placeholder="Inserisci eventuali note sul libro"></textarea>
            </div>
        </form>
    </main>
</body>

</html>
